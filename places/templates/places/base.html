{% if user.is_authenticated %}
    <a class="nav-link text-white" href="/suggest-place/">
        ➕ Suggest a Place
    </a>

    <form action="/accounts/logout/" method="post" class="d-inline ms-2">
        {% csrf_token %}
        <button type="submit" class="btn btn-sm btn-danger">
            🚪 Logout
        </button>
    </form>

{% else %}
    <a class="nav-link text-white" href="/accounts/login/">
        🔐 Login
    </a>

    <a class="nav-link text-white" href="/register/">
        📝 Register
    </a>
{% endif %}
